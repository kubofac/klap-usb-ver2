<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLAP_DEGI_USB - V8.5.8</title>
    <style>
        :root { --hrc-red: #E4002B; --hrc-white: #ffffff; --bg-dark: #000000; --hrc-orange: #FFA500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--hrc-white); font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #dashboard { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100vw; }
        
        /* 表示領域を増やすため、高さを調整 */
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 45px); z-index: 1; }
        
        .main-ui-container { position: absolute; right: 10px; top: 160px; bottom: 55px; display: flex; align-items: flex-start; gap: 40px; z-index: 20; }
        
        #info-overlay { display: flex; flex-direction: column; align-items: flex-end; text-align: right; gap: 5px; }
        #rpm_val { font-size: 12vh; font-weight: 900; line-height: 0.8; text-shadow: 3px 3px 12px #000; }
        #display1 { font-size: 16vh; font-weight: 900; line-height: 0.9; color: var(--hrc-white); text-shadow: 4px 4px 15px #000; }
        
        #sector-container { display: flex; justify-content: flex-end; gap: 15px; font-size: 4vh; font-weight: 900; height: 5vh; margin-top: 5px; }
        .sec-box { display: none; text-shadow: 2px 2px 10px #000; }
        .sec-val { color: var(--hrc-white); min-width: 2.2em; }
        #display { font-size: 3.5vh; color: #bbb; text-shadow: 1px 1px 6px #000; margin-top: 5px; }

        .right-panels { display: flex; flex-direction: row; gap: 15px; height: 100%; align-items: flex-start; }
        #lap-panel { width: 160px; height: 100%; overflow: hidden; }
        #lap { height: 100%; overflow-y: auto; scrollbar-width: none; }
        .lap-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 18px; font-weight: 900; border: none !important; }
        .best-lap { color: var(--hrc-red) !important; }

        .data-panel { display: flex; flex-direction: column; gap: 12px; width: 100px; }
        .data-box { display: flex; flex-direction: column; align-items: flex-end; }
        .label { font-size: 10px; color: var(--hrc-red); font-weight: bold; }
        .val { font-size: 36px; font-weight: 900; line-height: 0.9; }

        #history-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #history-table { width: 100%; border-collapse: collapse; font-size: 16px; border: none; }
        #history-table th { color: var(--hrc-red); font-size: 11px; padding: 10px 5px; border-bottom: 2px solid var(--hrc-red); }
        #history-table td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #history-close { position: sticky; top: 0; background: var(--hrc-red); padding: 12px; text-align: center; font-weight: bold; cursor: pointer; margin-bottom: 10px; z-index: 10; border-radius: 4px; }

        /* フッターの高さを 55px -> 40px に短縮 */
        footer { height: 40px; display: flex; gap: 3px; padding: 3px; background: #000; border-top: 1px solid #333; z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; }
        button { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 8px; font-weight: bold; cursor: pointer; padding: 2px; }
        button.active { background: var(--hrc-red) !important; color: #fff !important; }
        button.waiting { background: var(--hrc-orange) !important; color: #000 !important; }
        #saveLogBtn { background: #28a745; display: none; }
    </style>
</head>
<body>

<div id="dashboard">
    <canvas id="canvas"></canvas>
    <div class="main-ui-container">
        <div id="info-overlay">
            <div id="rpm_val">0</div>
            <div id="display1">00:00.000</div>
            <div id="sector-container">
                <div id="s1_box" class="sec-box">S1:<span id="s1_val" class="sec-val">--.--</span></div>
                <div id="s2_box" class="sec-box">S2:<span id="s2_val" class="sec-val">--.--</span></div>
                <div id="s3_box" class="sec-box">S3:<span id="s3_val" class="sec-val">--.--</span></div>
            </div>
            <div id="display">TOTAL 00:00.000</div>
        </div>
        <div class="right-panels">
            <div id="lap-panel"><div id="lap"></div></div>
            <div class="data-panel">
                <div class="data-box"><div class="label">SPEED</div><div class="val" id="speed_val">0</div></div>
                <div class="data-box"><div class="label">MAX</div><div class="val" id="max_speed_val" style="color: #FFA500;">0</div></div>
                <div class="data-box"><div class="label">TEMP</div><div class="val" id="temp_val">--</div></div>
            </div>
        </div>
    </div>
    <footer>
        <button id="usbGpsBtn">USB GPS</button>
        <button id="btConnect">BLE START</button>
        <button id="startBtn">TIMER</button>
        <button id="lapBtn">LAP/RESET</button>
        <button id="historyBtn">HISTORY</button>
        <button id="saveLogBtn">LOG SAVE</button>
        <button id="reloadBtn">RELOAD</button>
    </footer>
</div>

<div id="history-page">
    <div id="history-close">CLOSE HISTORY</div>
    <table id="history-table">
        <thead><tr><th>L</th><th>S1</th><th>S2</th><th>S3</th><th>TIME</th><th>MAX</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>
</div>

<script>
'use strict';

const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b", PULSE_UUID = "f4deb353-a4cf-4ffb-badb-2a5f2e3bb630";
let swState = 0, startTime = 0, lapStartTime = 0, lastLapTime = 0, lapRecords = [];
let currentRPM = 0, currentTemp = 0, currentSpeedKmh = 0, lastSpeedMs = 0, maxSpeedInLap = 0, sessionBest = Infinity;
let lastUsbDataTime = 0, lastBleDataTime = 0, usbWaiting = false, bleWaiting = false;
let isFrozen = false, freezeDisplayTime = "", freezeStartTime = 0;
let device = null, nmeaBuffer = '', lastPos = null;
let lines = { start: {p1:null, p2:null}, s1: {p1:null, p2:null}, s2: {p1:null, p2:null}, s3: {p1:null, p2:null} };
let detectedDirection = null, nextExpectedSector = 'finish'; 
let trackLogs = [], currentLapLog = [];

const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

// --- (ロジック部分はV8.5.3を維持) ---
function getIntersection(p1, p2, targetLine) {
    if (!targetLine.p1 || !targetLine.p2) return null;
    const x1 = p1.lon, y1 = p1.lat, x2 = p2.lon, y2 = p2.lat;
    const x3 = targetLine.p2.lon, y3 = targetLine.p2.lat, x4 = targetLine.p1.lon, y4 = targetLine.p1.lat;
    const den = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
    if (Math.abs(den) < 1e-12) return null;
    const t = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / den;
    const u = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / den;
    if (t >= 0 && t <= 1 && u >= -0.2 && u <= 1.2) {
        const crossProduct = ((x4 - x3) * (y2 - y1)) - ((y4 - y3) * (x2 - x1));
        return { time: p1.time + (p2.time - p1.time) * t, dir: crossProduct > 0 ? 1 : -1 };
    }
    return null;
}

function getDistanceToLine(pos, targetLine) {
    if (!targetLine.p1 || !targetLine.p2) return Infinity;
    const x0 = pos.lon, y0 = pos.lat;
    const x1 = targetLine.p1.lon, y1 = targetLine.p1.lat, x2 = targetLine.p2.lon, y2 = targetLine.p2.lat;
    const area = Math.abs((y2 - y1) * x0 - (x2 - x1) * y0 + x2 * y1 - y2 * x1);
    const len = Math.sqrt((y2 - y1) ** 2 + (x2 - x1) ** 2);
    return (area / len) * 111320; 
}

function parseNMEA(line) {
    const p = line.split(',');
    if (line.includes('RMC') && p[2] === 'A') {
        lastUsbDataTime = Date.now();
        currentSpeedKmh = parseFloat(p[7]) * 1.852;
        lastSpeedMs = currentSpeedKmh / 3.6;
        document.getElementById('speed_val').textContent = Math.round(currentSpeedKmh);
        if (currentSpeedKmh > maxSpeedInLap) maxSpeedInLap = Math.round(currentSpeedKmh);
    }
    if (line.includes('GGA') && p[6] !== '0') {
        const cur = { lat: dmmToDec(p[2], p[3]), lon: dmmToDec(p[4], p[5]), time: Date.now(), speed: currentSpeedKmh, rpm: currentRPM };
        if (swState === 1) {
            currentLapLog.push(cur);
            if (lastPos) {
                if (nextExpectedSector !== 'finish' && lapStartTime > 0) {
                    const s = nextExpectedSector;
                    const hit = getIntersection(lastPos, cur, lines[s]);
                    if (hit && (detectedDirection === null || hit.dir === detectedDirection)) {
                        const secTime = hit.time - lapStartTime;
                        if (secTime > 1500) { 
                            document.getElementById(s + '_val').textContent = (secTime/1000).toFixed(2);
                            setNextSector(s); 
                        }
                    }
                }
                const hitStart = getIntersection(lastPos, cur, lines.start);
                if (hitStart) {
                    if (detectedDirection === null) detectedDirection = hitStart.dir;
                    if (hitStart.dir === detectedDirection) {
                        const coolDown = parseFloat(localStorage.getItem('lapCoolDownTime')) || 30000;
                        if (hitStart.time - lastLapTime >= coolDown) processLap(hitStart.time, true);
                    }
                }
            }
        }
        lastPos = cur;
    }
}

function setNextSector(current) {
    if (current === 's1') {
        if (lines.s2.p1) nextExpectedSector = 's2'; else if (lines.s3.p1) nextExpectedSector = 's3'; else nextExpectedSector = 'finish';
    } else if (current === 's2') {
        if (lines.s3.p1) nextExpectedSector = 's3'; else nextExpectedSector = 'finish';
    } else if (current === 's3') nextExpectedSector = 'finish';
}

function processLap(exactTime, useFreeze) {
    const lapTime = exactTime - (lapStartTime || startTime);
    if (useFreeze && lapTime <= 5000) return; 
    if (!useFreeze && lapTime <= 500) return; 
    if (lapStartTime > 0) {
        const record = { time: lapTime, max: maxSpeedInLap, s1: getV('s1_val'), s2: getV('s2_val'), s3: getV('s3_val') };
        lapRecords.unshift(record);
        trackLogs.push([...currentLapLog]);
        if (lapTime < sessionBest) sessionBest = lapTime;
    }
    currentLapLog = [];
    lapStartTime = exactTime; lastLapTime = exactTime; maxSpeedInLap = 0;
    ['s1_val', 's2_val', 's3_val'].forEach(id => document.getElementById(id).textContent = "--.--");
    if (lines.s1.p1) nextExpectedSector = 's1';
    else if (lines.s2.p1) nextExpectedSector = 's2';
    else if (lines.s3.p1) nextExpectedSector = 's3';
    else nextExpectedSector = 'finish';
    updateLapDisplay();
    if (useFreeze && lapStartTime > 0) { isFrozen = true; freezeDisplayTime = timeFormat(lapTime); freezeStartTime = Date.now(); }
    else { isFrozen = false; }
    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
}

function getV(id){ return document.getElementById(id).textContent; }
function dmmToDec(dmm, dir) { if(!dmm || dmm.indexOf('.') === -1) return 0; const dot = dmm.indexOf('.'); const d = parseInt(dmm.substring(0, dot-2)), m = parseFloat(dmm.substring(dot-2)); let dec = d + (m/60); return (dir === 'S' || dir === 'W') ? -dec : dec; }
function timeFormat(ms) { let m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000), mss = Math.floor(ms%1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${mss.toString().padStart(3,'0')}`; }

function updateLapDisplay() {
    const d = document.getElementById('lap'); d.innerHTML = "";
    lapRecords.forEach((r, i) => {
        const div = document.createElement('div'); div.className = `lap-row ${r.time === sessionBest ? 'best-lap' : ''}`;
        div.innerHTML = `<span>L${lapRecords.length-i}</span><span>${timeFormat(r.time)}</span>`; d.appendChild(div);
    });
}

function tick() { 
    if (swState !== 1) return;
    const now = Date.now();
    if (lastPos && !isFrozen && nextExpectedSector === 'finish' && lastSpeedMs > 2 && lapStartTime > 0) {
        const dist = getDistanceToLine(lastPos, lines.start);
        const timeToReach = (dist / lastSpeedMs) * 1000;
        if (now >= lastPos.time + timeToReach) {
            const predLapTime = (lastPos.time + timeToReach) - lapStartTime;
            const coolDown = parseFloat(localStorage.getItem('lapCoolDownTime')) || 30000;
            if (predLapTime > 5000 && (lastPos.time + timeToReach - lastLapTime) >= coolDown) {
                isFrozen = true; freezeDisplayTime = timeFormat(predLapTime); freezeStartTime = now;
            }
        }
    }
    document.getElementById('display').textContent = "TOTAL " + timeFormat(now - startTime);
    const d1 = document.getElementById('display1');
    if (isFrozen) { d1.textContent = freezeDisplayTime; if (now - freezeStartTime > 15000) isFrozen = false; }
    else { d1.textContent = lapStartTime > 0 ? timeFormat(now - lapStartTime) : "00:00.000"; document.getElementById('max_speed_val').textContent = maxSpeedInLap; }
    requestAnimationFrame(tick);
}

function drawTacho(rpm) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height, segments = 75, active = Math.floor((rpm / 14000) * segments);
    const sX = 20, hY = 80, bY = h - 20, rad = bY - hY, curveEnd = 30;
    for (let i = 0; i <= segments; i++) {
        let x, y, ang, prog;
        if (i <= curveEnd) { prog = i / curveEnd; ang = Math.PI + (prog * (Math.PI / 2)); x = sX + rad + Math.cos(ang) * rad; y = hY + rad + Math.sin(ang) * rad; }
        else { prog = (i - curveEnd) / (segments - curveEnd); x = (sX + rad) + (prog * (w - 15 - (sX + rad))); y = hY; ang = 1.5 * Math.PI; }
        if (i % 10 === 0 || i === segments) { ctx.save(); ctx.fillStyle = i < active ? "#fff" : "#444"; ctx.font = "italic bold 22px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.round((i / segments) * 14), x + Math.cos(ang) * 45, y + Math.sin(ang) * 45); ctx.restore(); }
        if (i < segments) { ctx.fillStyle = i < active ? (((i/segments)*14000) >= 12500 ? "#E4002B" : (((i/segments)*14000) >= 8000 ? "#004098" : "#FFFFFF")) : "#222"; ctx.save(); ctx.translate(x, y); ctx.rotate(ang + Math.PI / 2); ctx.fillRect(-5, -23, 10, 46); ctx.restore(); }
    }
    document.getElementById('rpm_val').textContent = Math.floor(rpm);
}

document.getElementById('usbGpsBtn').onclick = async () => {
    try {
        device = await navigator.usb.requestDevice({ filters: [] });
        await device.open(); await device.selectConfiguration(1); await device.claimInterface(1);
        usbWaiting = true;
        while (device) {
            const res = await device.transferIn(2, 512);
            const linesN = (nmeaBuffer + new TextDecoder().decode(res.data)).split(/\r?\n/);
            nmeaBuffer = linesN.pop(); linesN.forEach(parseNMEA);
        }
    } catch (e) { usbWaiting = false; }
};

document.getElementById('btConnect').onclick = async function() {
    try {
        const ble = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        const server = await ble.gatt.connect(), service = await server.getPrimaryService(SERVICE_UUID);
        const pC = await service.getCharacteristic(PULSE_UUID);
        await pC.startNotifications(); bleWaiting = true;
        pC.oncharacteristicvaluechanged = (e) => {
            lastBleDataTime = Date.now();
            const data = e.target.value; currentRPM = (data.getUint16(0, true) * 60) / (parseInt(localStorage.getItem('pl1')) || 1); 
            currentTemp = data.getUint8(2); document.getElementById('temp_val').textContent = currentTemp;
        };
    } catch (e) { bleWaiting = false; }
};

document.getElementById('startBtn').onclick = function() {
    if (swState !== 1) {
        swState = 1; startTime = Date.now(); lapStartTime = 0; lastLapTime = 0;
        this.className = 'active'; document.getElementById('saveLogBtn').style.display = 'none';
        nextExpectedSector = 'finish'; tick();
    } else { swState = 2; this.className = ''; document.getElementById('saveLogBtn').style.display = 'block'; }
};

document.getElementById('lapBtn').onclick = () => {
    const now = Date.now();
    if(swState === 1) { processLap(now, false); } else {
        swState = 0; lapRecords = []; trackLogs = []; currentLapLog = []; detectedDirection = null; sessionBest = Infinity; maxSpeedInLap = 0; isFrozen = false; lapStartTime = 0;
        document.getElementById('lap').innerHTML = ""; document.getElementById('display1').textContent = "00:00.000"; document.getElementById('display').textContent = "TOTAL 00:00.000"; document.getElementById('max_speed_val').textContent = "0";
        ['s1_val', 's2_val', 's3_val'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).textContent = "--.--"; });
    }
};

document.getElementById('historyBtn').onclick = () => {
    const body = document.getElementById('history-body'); body.innerHTML = "";
    lapRecords.forEach((r, i) => {
        const lapNum = lapRecords.length - i;
        body.innerHTML += `<tr><td>${lapNum}</td><td>${r.s1}</td><td>${r.s2}</td><td>${r.s3}</td><td style="font-weight:bold; color:${r.time === sessionBest ? 'var(--hrc-red)':'#fff'}">${timeFormat(r.time)}</td><td>${r.max}</td></tr>`;
    });
    document.getElementById('history-page').style.display = 'block';
};
document.getElementById('history-close').onclick = () => document.getElementById('history-page').style.display = 'none';

document.getElementById('saveLogBtn').onclick = () => {
    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="KLAP_DEGI" xmlns="http://www.topografix.com/GPX/1/1" xmlns:gpxtpx="http://www.garmin.com/xmlschemas/TrackPointExtension/v1">`;
    [...trackLogs, currentLapLog].forEach((lap, i) => {
        if (lap.length === 0) return;
        gpx += `\n<trk><name>Lap ${i+1}</name><trkseg>`;
        lap.forEach(p => { gpx += `\n  <trkpt lat="${p.lat}" lon="${p.lon}"><time>${new Date(p.time).toISOString()}</time><extensions><gpxtpx:TrackPointExtension><gpxtpx:hr>${Math.round(p.rpm)}</gpxtpx:hr></gpxtpx:TrackPointExtension><speed>${(p.speed / 3.6).toFixed(2)}</speed></extensions></trkpt>`; });
        gpx += `\n</trkseg></trk>`;
    });
    gpx += `\n</gpx>`;
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([gpx], { type: 'application/gpx+xml' })); a.download = `RaceLog_${Date.now()}.gpx`; a.click();
};

document.getElementById('reloadBtn').onclick = () => location.reload();

setInterval(() => {
    const now = Date.now();
    document.getElementById('usbGpsBtn').className = (now - lastUsbDataTime < 1500) ? 'active' : (usbWaiting ? 'waiting' : '');
    document.getElementById('btConnect').className = (now - lastBleDataTime < 1500) ? 'active' : (bleWaiting ? 'waiting' : '');
}, 1000);

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 45; };
window.onload = () => {
    window.dispatchEvent(new Event('resize'));
    const loadLine = (key) => {
        const lat = localStorage.getItem(key + 'LineP1Lat');
        if (lat) {
            if (key !== 'start') document.getElementById(key + '_box').style.display = 'block';
            return { p1: { lat: parseFloat(lat), lon: parseFloat(localStorage.getItem(key + 'LineP1Lon')) }, p2: { lat: parseFloat(localStorage.getItem(key + 'LineP2Lat')), lon: parseFloat(localStorage.getItem(key + 'LineP2Lon')) } };
        }
        return { p1: null, p2: null };
    };
    lines.start = loadLine('start'); lines.s1 = loadLine('s1'); lines.s2 = loadLine('s2'); lines.s3 = loadLine('s3');
    (function render(){ drawTacho(currentRPM); requestAnimationFrame(render); })();
};
</script>
</body>
</html>
