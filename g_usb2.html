<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLAP_DEGI_USB - V10.6.3_Turbo</title>
    <style>
        :root { --hrc-red: #E4002B; --hrc-white: #ffffff; --bg-dark: #000000; --hrc-orange: #FFA500; --hrc-blue: #004098; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--hrc-white); font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #dashboard { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100vw; }
        #canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: calc(100% - 60px) !important; z-index: 1; }
        .main-ui-container { position: absolute; right: 10px; top: 120px; bottom: 70px; display: flex; align-items: flex-start; gap: 45px; z-index: 20; pointer-events: auto; }
        #info-overlay { display: flex; flex-direction: column; align-items: flex-end; text-align: right; gap: 10px; }
        #rpm_val { font-size: 13vh; font-weight: 900; line-height: 0.8; margin-top: 10px; text-shadow: 3px 3px 12px #000; }
        #display1 { font-size: 18vh; font-weight: 900; line-height: 0.9; color: var(--hrc-white); text-shadow: 4px 4px 15px #000; }
        #sector-container { display: flex; justify-content: flex-end; gap: 15px; font-size: 3vh; font-weight: 900; height: 3.5vh; }
        .sec-box { display: none; text-shadow: 2px 2px 10px #000; color: #fff; }
        /* 右側のパネル全体の並び */
        .right-panels { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            height: 100%; 
            align-items: flex-start; 
        }
        #lap-panel { width: 175px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        #lap { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .lap-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 18px; font-weight: 900; }
        .best-lap { color: var(--hrc-red) !important; } 
       /* データパネル（SPEED等）を右寄せにする設定 */
        .data-panel { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 110px;
            align-items: flex-end; /* 子要素を右側に寄せる */
        }
      .val { 
            font-size: 40px; 
            font-weight: 900; 
            line-height: 0.9; 
            text-shadow: 2px 2px 8px #000;
            text-align: right;       /* 数値を右寄せ */
            width: 100%;
        }

        .label { 
            font-size: 11px; 
            color: var(--hrc-red); 
            font-weight: bold; 
            text-align: right;      /* ラベルも右寄せ */
            width: 100%;
        }
        footer { height: 55px; display: flex; gap: 2px; padding: 4px; background: #000; border-top: 1px solid #333; z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; }
        button { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 9px; font-weight: bold; min-width: 0; cursor: pointer; transition: 0.2s; }
        button.active { background: var(--hrc-red) !important; color: #fff !important; }
        #history-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #history-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 20px; }
        #history-table th { color: var(--hrc-red); border-bottom: 2px solid var(--hrc-red); padding: 8px; text-align: center; }
        #history-table td { padding: 8px; border-bottom: 1px solid #333; text-align: center; }
        .close-btn { background: var(--hrc-red); padding: 15px; text-align: center; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div id="dashboard">
    <canvas id="canvas"></canvas>
    <div class="main-ui-container">
        <div id="info-overlay">
            <div id="rpm_val">0</div><div id="display1">00:00.000</div>
            <div id="sector-container">
                <div id="s1_box" class="sec-box">S1: <span id="s1_val">--.--</span></div>
                <div id="s2_box" class="sec-box">S2: <span id="s2_val">--.--</span></div>
                <div id="s3_box" class="sec-box">S3: <span id="s3_val">--.--</span></div>
            </div>
            <div id="display" style="font-size: 2.5vh; opacity: 0.8;">TOTAL 00:00.000</div>
        </div>
        <div class="right-panels">
            <div id="lap-panel"><div id="lap"></div></div>
            <div class="data-panel">
                <div class="data-box"><div class="label">SPEED</div><div class="val" id="speed_val">0</div></div>
                <div class="data-box"><div class="label">MAX</div><div class="val" id="max_speed_val" style="color: var(--hrc-orange);">0</div></div>
                <div class="data-box"><div class="label">TEMP</div><div class="val" id="temp_val">--</div></div>
            </div>
        </div>
    </div>
    <footer>
        <button id="usbGpsBtn">USB GPS</button><button id="btConnect">BLE START</button>
        <button id="startBtn">TIMER</button><button id="lapBtn">LAP/RESET</button>
        <button id="historyBtn">HISTORY</button><button id="gpxBtn" style="display:none; background:var(--hrc-orange); color:#000;">GPX SAVE</button>
        <button id="mapBtn" onclick="location.href='index.html'">MAP</button> 
        <button id="reloadBtn" onclick="location.reload()">RELOAD</button>
    </footer>
</div>

<div id="history-page">
    <div class="close-btn" onclick="document.getElementById('history-page').style.display='none'">CLOSE HISTORY</div>
    <table id="history-table">
        <thead><tr><th>LAP</th><th>S1</th><th>S2</th><th>S3</th><th>S4</th><th>TIME</th><th>MAX SPD</th><th>MAX RPM</th></tr></thead>
        <tbody id="history-body"></tbody>
    </table>
</div>

<script>
'use strict';
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b", PULSE_UUID = "f4deb353-a4cf-4ffb-badb-2a5f2e3bb630";
let swState = 0, startTime = 0, lapStartTime = 0, lapRecords = [], gpsPoints = [];
let currentRPM = 0, currentTemp = 0, device = null, nmeaBuffer = '', lastPos = null;
let lines = { startLine: null, s1Line: null, s2Line: null, s3Line: null };
let currentSpeedKmh = 0, maxSpeedInLap = 0, maxRpmInLap = 0;
let isFrozen = false, freezeDisplayTime = "", freezeUntil = 0;
let pulsePerRev = 1, cooldownMs = 30000, validDirection = null;
let s1_abs = 0, s2_abs = 0, s3_abs = 0, lastPassedSectorTime = 0;
let sectorDirections = { s1: null, s2: null, s3: null };
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

// BLE & Wake Lock グローバル変数
let bleDevice = null;
let wakeLock = null;

// --- 1. BLE接続・爆速再接続コアロジック ---
async function connectToBleDevice() {
    if (!bleDevice) return;

    try {
        console.log("Attempting to connect...");
        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(PULSE_UUID);
        
        await characteristic.startNotifications();
        document.getElementById('btConnect').classList.add('active');

        characteristic.oncharacteristicvaluechanged = (e) => {
            const data = e.target.value;
            currentRPM = (data.getUint16(0, true) * 60) / pulsePerRev;
            currentTemp = data.getUint8(2);
            document.getElementById('temp_val').textContent = currentTemp;
        };

        // イベントリスナーの重複登録防止
        bleDevice.removeEventListener('gattserverdisconnected', onDisconnected);
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
        
        console.log("BLE Connected Successfully.");
        requestWakeLock(); // 画面スリープ防止

    } catch (error) {
        console.warn("Connect failed, retrying in 500ms...", error);
        // ★爆速リトライ：失敗しても0.5秒後に即試行
        setTimeout(connectToBleDevice, 500);
    }
}

function onDisconnected() {
    console.error("BLE Disconnected! Instant retry triggered.");
    document.getElementById('btConnect').classList.remove('active');
    // ★爆速リトライ：切断検知から0.5秒後に再接続
    setTimeout(connectToBleDevice, 500);
}

document.getElementById('btConnect').onclick = async function() {
    try {
        if (!bleDevice) {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }]
            });
        }
        await connectToBleDevice();
    } catch (e) {
        console.log("User cancelled device selection");
    }
};

// --- 2. 画面スリープ防止 (Wake Lock) ---
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.error(`WakeLock Error: ${err.message}`);
    }
}

// --- GPS・タイマーロジック (変更なし) ---

function initLines() {
    ['startLine', 's1Line', 's2Line', 's3Line'].forEach(key => {
        const lat = localStorage.getItem(key + 'P1Lat');
        if (lat) {
            lines[key] = {
                p1: { lat: parseFloat(localStorage.getItem(key + 'P1Lat')), lon: parseFloat(localStorage.getItem(key + 'P1Lon')) },
                p2: { lat: parseFloat(localStorage.getItem(key + 'P2Lat')), lon: parseFloat(localStorage.getItem(key + 'P2Lon')) }
            };
            const boxId = key.replace('Line', '') + '_box';
            if (document.getElementById(boxId)) document.getElementById(boxId).style.display = 'block';
        }
    });
    pulsePerRev = parseFloat(localStorage.getItem('pl1')) || 1;
    cooldownMs = parseInt(localStorage.getItem('cooldown')) || 30000;
}

function getIntersection(p1, p2, line) {
    if (!line) return null;
    const x1 = p1.lon, y1 = p1.lat, x2 = p2.lon, y2 = p2.lat;
    const x3 = line.p1.lon, y3 = line.p1.lat, x4 = line.p2.lon, y4 = line.p2.lat;
    const den = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
    if (Math.abs(den) < 1e-12) return null;
    const t = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / den;
    const u = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / den;
    if (t >= 0 && t <= 1 && u >= -0.2 && u <= 1.2) {
        const Lx = x4 - x3, Ly = y4 - y3, Vx = x2 - x1, Vy = y2 - y1;
        const crossProduct = (Lx * Vy) - (Ly * Vx);
        const direction = crossProduct > 0 ? 1 : -1;
        return { time: p1.time + (p2.time - p1.time) * t, dir: direction };
    }
    return null;
}

function parseNMEA(line) {
    if (!line.includes('RMC') && !line.includes('GGA')) return;
    const p = line.split(','), btn = document.getElementById('usbGpsBtn');
    let fix = false;
    if (line.includes('RMC') && p[2] === 'A') {
        fix = true;
        currentSpeedKmh = parseFloat(p[7]) * 1.852;
        if (currentSpeedKmh > maxSpeedInLap) maxSpeedInLap = Math.round(currentSpeedKmh);
    }
    if (line.includes('GGA') && (p[6] !== '0' && p[6] !== '')) {
        fix = true;
        const cur = { lat: dmmToDec(p[2], p[3]), lon: dmmToDec(p[4], p[5]), rpm: currentRPM || 0, speed: currentSpeedKmh || 0, time: Date.now() };
        if (swState === 1 && lastPos) {
            gpsPoints.push(cur);
            const hitSL = getIntersection(lastPos, cur, lines.startLine);
            if (hitSL) {
                if (validDirection === null) validDirection = hitSL.dir;
                if (hitSL.dir === validDirection && (hitSL.time - (lapStartTime || startTime) > cooldownMs)) {
                    processLap(hitSL.time);
                }
            }
            if (lapStartTime > 0) {
                ['s1', 's2', 's3'].forEach(s => {
                    const hit = getIntersection(lastPos, cur, lines[s + 'Line']);
                    if (hit) {
                        if (sectorDirections[s] === null) sectorDirections[s] = hit.dir;
                        if (hit.dir === sectorDirections[s]) {
                            const absTime = (hit.time - lapStartTime) / 1000;
                            if (s === 's1' && s1_abs === 0) {
                                s1_abs = absTime; lastPassedSectorTime = absTime;
                                document.getElementById('s1_val').textContent = s1_abs.toFixed(3);
                            } else if (s === 's2' && s2_abs === 0) {
                                s2_abs = absTime; lastPassedSectorTime = absTime;
                                document.getElementById('s2_val').textContent = (s1_abs > 0 ? (s2_abs - s1_abs) : s2_abs).toFixed(3);
                            } else if (s === 's3' && s3_abs === 0) {
                                s3_abs = absTime; lastPassedSectorTime = absTime;
                                document.getElementById('s3_val').textContent = (s2_abs > 0 ? (s3_abs - s2_abs) : s3_abs).toFixed(3);
                            }
                        }
                    }
                });
            }
        }
        lastPos = cur;
    }
    btn.style.background = fix ? "var(--hrc-red)" : "var(--hrc-orange)";
    btn.style.color = fix ? "#fff" : "#000";
}

function processLap(hitTime) {
    const lapTimeMs = hitTime - (lapStartTime || startTime);
    const lapTimeSec = lapTimeMs / 1000;
    let s4 = lastPassedSectorTime > 0 ? (lapTimeSec - lastPassedSectorTime).toFixed(3) : "--.---";
    const lapData = { no: lapRecords.length + 1, time: lapTimeMs, max: Math.round(maxSpeedInLap), maxRpm: Math.round(maxRpmInLap), s1: document.getElementById('s1_val').textContent, s2: document.getElementById('s2_val').textContent, s3: document.getElementById('s3_val').textContent, s4: s4 };
    lapRecords.unshift(lapData);
    updateLapList();
    isFrozen = true; freezeDisplayTime = timeFormat(lapTimeMs); freezeUntil = Date.now() + 15000;
    lapStartTime = hitTime; maxSpeedInLap = 0; maxRpmInLap = 0; s1_abs = 0; s2_abs = 0; s3_abs = 0; lastPassedSectorTime = 0;
    setTimeout(() => { if(swState === 1) { ['s1_val','s2_val','s3_val'].forEach(id => { document.getElementById(id).textContent = "--.---"; }); } }, 3000);
}

function updateLapList() {
    if (lapRecords.length === 0) return;
    const best = Math.min(...lapRecords.map(r => r.time));
    document.getElementById('lap').innerHTML = lapRecords.map(r => `<div class="lap-row ${r.time === best && lapRecords.length > 1 ? 'best-lap' : ''}"><span>L${r.no}</span><span>${timeFormat(r.time)}</span></div>`).join('');
}

function mainLoop() {
    const now = Date.now();
    if (swState === 1) {
        if (currentRPM > maxRpmInLap) maxRpmInLap = Math.round(currentRPM);
        document.getElementById('display').textContent = "TOTAL " + timeFormat(now - startTime);
        document.getElementById('display1').textContent = (isFrozen && now < freezeUntil) ? freezeDisplayTime : timeFormat(now - (lapStartTime || startTime));
    }
    drawTacho(currentRPM);
    requestAnimationFrame(mainLoop);
}

function drawTacho(rpm) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height, segments = 75, active = Math.floor((rpm / 14000) * segments);
    const sX = 20, hY = 80, bY = h - 20, rad = bY - hY, curveEnd = 30;
    for (let i = 0; i <= segments; i++) {
        let x, y, ang, prog;
        if (i <= curveEnd) { prog = i/curveEnd; ang = Math.PI + (prog*(Math.PI/2)); x = sX+rad+Math.cos(ang)*rad; y = hY+rad+Math.sin(ang)*rad; }
        else { prog = (i-curveEnd)/(segments-curveEnd); x = (sX+rad)+(prog*(w-15-(sX+rad))); y = hY; ang = 1.5*Math.PI; }
        if (i % 10 === 0 || i === segments) { ctx.save(); ctx.fillStyle = i < active ? "#fff" : "#444"; ctx.font = "italic bold 22px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.round((i/segments)*14), x+Math.cos(ang)*45, y+Math.sin(ang)*45); ctx.restore(); }
        if (i < segments) {
            let color = "#222";
            if (i < active) { const val = (i/segments)*14000; color = (val >= 12500) ? "var(--hrc-red)" : (val >= 8000 ? "var(--hrc-blue)" : "#fff"); }
            ctx.fillStyle = color; ctx.save(); ctx.translate(x, y); ctx.rotate(ang + Math.PI/2); ctx.fillRect(-5, -23, 10, 46); ctx.restore();
        }
    }
    document.getElementById('rpm_val').textContent = Math.floor(rpm);
    document.getElementById('speed_val').textContent = Math.round(currentSpeedKmh);
    document.getElementById('max_speed_val').textContent = maxSpeedInLap;
}

document.getElementById('lapBtn').onclick = function() {
    if (swState === 1) {
        const hitTime = Date.now(); const lapTimeMs = hitTime - (lapStartTime || startTime);
        const lapData = { no: lapRecords.length + 1, time: lapTimeMs, max: Math.round(maxSpeedInLap), maxRpm: Math.round(maxRpmInLap), s1: document.getElementById('s1_val').textContent, s2: document.getElementById('s2_val').textContent, s3: document.getElementById('s3_val').textContent, s4: lastPassedSectorTime > 0 ? ((lapTimeMs/1000) - lastPassedSectorTime).toFixed(3) : "--.---" };
        lapRecords.unshift(lapData); updateLapList();
        lapStartTime = hitTime; maxSpeedInLap = 0; maxRpmInLap = 0; s1_abs = 0; s2_abs = 0; s3_abs = 0; lastPassedSectorTime = 0;
    } else if (confirm("リセットしてリロードしますか？")) { location.reload(); }
};

document.getElementById('startBtn').onclick = function() {
    if (swState !== 1) { swState = 1; startTime = Date.now(); lapStartTime = 0; lapRecords = []; gpsPoints = []; validDirection = null; this.classList.add('active'); document.getElementById('gpxBtn').style.display = 'none'; }
    else { swState = 2; this.classList.remove('active'); document.getElementById('gpxBtn').style.display = 'block'; }
};

document.getElementById('usbGpsBtn').onclick = async function() {
    try {
        device = await navigator.usb.requestDevice({ filters: [] });
        await device.open(); await device.selectConfiguration(1);
        await device.claimInterface(parseInt(localStorage.getItem('usb_interface')) || 1);
        while (device) { const res = await device.transferIn(parseInt(localStorage.getItem('usb_endpoint')) || 2, 512); const linesN = (nmeaBuffer + new TextDecoder().decode(res.data)).split(/\r?\n/); nmeaBuffer = linesN.pop(); linesN.forEach(parseNMEA); }
    } catch (e) { console.error(e); }
};

document.getElementById('historyBtn').onclick = function() {
    if (lapRecords.length === 0) return;
    this.classList.add('active');
    const getBest = (key, type) => { const vals = lapRecords.map(r => parseFloat(r[key])).filter(v => !isNaN(v)); return type === 'min' ? Math.min(...vals) : Math.max(...vals); };
    const bT = Math.min(...lapRecords.map(r => r.time)), bS1 = getBest('s1','min'), bS2 = getBest('s2','min'), bS3 = getBest('s3','min'), bS4 = getBest('s4','min'), bSpd = getBest('max','max'), bRpm = getBest('maxRpm','max');
    document.getElementById('history-body').innerHTML = lapRecords.map(r => `<tr style="${r.time === bT ? 'background:rgba(228,0,43,0.15);' : ''}"><td>${r.no}</td><td style="${parseFloat(r.s1)===bS1?'color:var(--hrc-red);':''}">${r.s1}</td><td style="${parseFloat(r.s2)===bS2?'color:var(--hrc-red);':''}">${r.s2}</td><td style="${parseFloat(r.s3)===bS3?'color:var(--hrc-red);':''}">${r.s3}</td><td style="${parseFloat(r.s4)===bS4?'color:var(--hrc-red);':''}">${r.s4}</td><td style="${r.time===bT?'color:var(--hrc-red);':''}">${timeFormat(r.time)}</td><td style="${r.max===bSpd?'color:var(--hrc-red);':''}">${r.max}</td><td style="${r.maxRpm===bRpm?'color:var(--hrc-red);':''}">${r.maxRpm}</td></tr>`).join('');
    document.getElementById('history-page').style.display = 'block';
};

document.getElementById('gpxBtn').onclick = () => {
    if (gpsPoints.length === 0) return;
    const getL = (k) => { const p1Lat = localStorage.getItem(k + 'P1Lat'); if (!p1Lat) return ""; return `${p1Lat},${localStorage.getItem(k + 'P1Lon')},${localStorage.getItem(k + 'P2Lat')},${localStorage.getItem(k + 'P2Lon')}`; };
    const lineData = `SL:${getL('startLine')}|S1:${getL('s1Line')}|S2:${getL('s2Line')}|S3:${getL('s3Line')}`;
    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="KLAP_DEGI" xmlns="http://www.topografix.com/GPX/1/1" xmlns:gpxtpx="http://www.garmin.com/xmlschemas/TrackPointExtension/v1"><metadata><name>Session ${new Date().toLocaleString()}</name><desc>LINE_DATA[${lineData}]</desc></metadata><trk><name>Race Log</name><trkseg>`;
    const baseStartTime = gpsPoints[0].time;
    gpsPoints.forEach(p => {
        const relativeTime = new Date(946684800000 + (p.time - baseStartTime)).toISOString();
        gpx += `<trkpt lat="${p.lat}" lon="${p.lon}"><time>${relativeTime}</time><speed>${(p.speed / 3.6).toFixed(2)}</speed><extensions><gpxtpx:TrackPointExtension><gpxtpx:hr>${Math.round(p.rpm || 0)}</gpxtpx:hr><gpxtpx:atemp>${p.temp || 0}</gpxtpx:atemp></gpxtpx:TrackPointExtension></extensions></trkpt>`;
    });
    gpx += `</trkseg></trk></gpx>`;
    const blob = new Blob([gpx], { type: 'application/gpx+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `RaceLog_${Date.now()}.gpx`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
};

function dmmToDec(d, dir){ if(!d) return 0; const dot=d.indexOf('.'); const deg=parseInt(d.substring(0,dot-2)), min=parseFloat(d.substring(dot-2)); return (dir==='S'||dir==='W')?-(deg+min/60):(deg+min/60); }
function timeFormat(ms){ if(ms<0) ms=0; const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), ms2=Math.floor(ms%1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms2.toString().padStart(3,'0')}`; }

window.onload = () => { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; initLines(); mainLoop(); };
</script>
</body>
</html>
