<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLAP_DEGI_USB - V9.0.0</title>
    <style>
        :root { --hrc-red: #E4002B; --hrc-white: #ffffff; --bg-dark: #000000; --hrc-orange: #FFA500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--hrc-white); font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #dashboard { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100vw; }
        #canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: calc(100% - 60px) !important; z-index: 1; }
        .main-ui-container { position: absolute; right: 10px; top: 120px; bottom: 70px; display: flex; align-items: flex-start; gap: 45px; z-index: 20; pointer-events: auto; }
        #info-overlay { display: flex; flex-direction: column; align-items: flex-end; text-align: right; gap: 10px; }
        #rpm_val { font-size: 13vh; font-weight: 900; line-height: 0.8; margin-top: 10px; text-shadow: 3px 3px 12px #000; }
        #display1 { font-size: 18vh; font-weight: 900; line-height: 0.9; color: var(--hrc-white); text-shadow: 4px 4px 15px #000; }
        #sector-container { display: flex; justify-content: flex-end; gap: 15px; font-size: 3vh; font-weight: 900; height: 3.5vh; }
        .sec-box { display: none; text-shadow: 2px 2px 10px #000; color: #fff; }
        .right-panels { display: flex; flex-direction: row; gap: 15px; height: 100%; align-items: flex-start; }
        #lap-panel { width: 175px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        #lap { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .lap-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 18px; font-weight: 900; }
        .best-lap { color: var(--hrc-red) !important; } 
        .data-panel { display: flex; flex-direction: column; gap: 15px; width: 110px; }
        .val { font-size: 40px; font-weight: 900; line-height: 0.9; text-shadow: 2px 2px 8px #000; }
        .label { font-size: 11px; color: var(--hrc-red); font-weight: bold; }
        footer { height: 55px; display: flex; gap: 2px; padding: 4px; background: #000; border-top: 1px solid #333; z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; }
        button { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 9px; font-weight: bold; min-width: 0; cursor: pointer; }
        button.active { background: var(--hrc-red) !important; color: #fff !important; }
        #gpxBtn { display: none; background: var(--hrc-orange); color: #000; }
        .config-missing { background: var(--hrc-orange) !important; color: #000 !important; }
        #history-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #history-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 20px; }
        #history-table th { color: var(--hrc-red); border-bottom: 2px solid var(--hrc-red); padding: 8px; text-align: center; }
        #history-table td { padding: 8px; border-bottom: 1px solid #333; text-align: center; }
        .close-btn { background: var(--hrc-red); padding: 15px; text-align: center; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div id="dashboard">
    <canvas id="canvas"></canvas>
    <div class="main-ui-container">
        <div id="info-overlay">
            <div id="rpm_val">0</div><div id="display1">00:00.000</div>
            <div id="sector-container">
                <div id="s1_box" class="sec-box">S1: <span id="s1_val">--.--</span></div>
                <div id="s2_box" class="sec-box">S2: <span id="s2_val">--.--</span></div>
                <div id="s3_box" class="sec-box">S3: <span id="s3_val">--.--</span></div>
            </div>
            <div id="display">TOTAL 00:00.000</div>
        </div>
        <div class="right-panels">
            <div id="lap-panel"><div id="lap"></div></div>
            <div class="data-panel">
                <div class="data-box"><div class="label">SPEED</div><div class="val" id="speed_val">0</div></div>
                <div class="data-box"><div class="label">MAX</div><div class="val" id="max_speed_val" style="color: #FFA500;">0</div></div>
                <div class="data-box"><div class="label">TEMP</div><div class="val" id="temp_val">--</div></div>
            </div>
        </div>
    </div>
    <footer>
        <button id="usbGpsBtn">USB GPS</button><button id="btConnect">BLE START</button>
        <button id="startBtn">TIMER</button><button id="lapBtn">LAP/RESET</button>
        <button id="historyBtn">HISTORY</button><button id="gpxBtn">GPX SAVE</button>
        <button id="mapBtn" onclick="location.href='index.html'">MAP</button> 
        <button id="reloadBtn">RELOAD</button>
    </footer>
</div>
<div id="history-page">
    <div class="close-btn" onclick="document.getElementById('history-page').style.display='none'">CLOSE HISTORY</div>
    <table id="history-table"><thead><tr><th>LAP</th><th>S1</th><th>S2</th><th>S3</th><th>TIME</th><th>MAX SPD</th><th>MAX RPM</th></tr></thead><tbody id="history-body"></tbody></table>
</div>

<script>
/* ==========================================================================
   APPLICATION SPECIFICATIONS (DO NOT REMOVE)
   --------------------------------------------------------------------------
   1. FOOTER LAYOUT:
      Order: [USB GPS] [BLE START] [TIMER] [LAP/RESET] [HISTORY] [GPX SAVE] [MAP] [RELOAD]
   
   2. BUTTON LOGIC:
      - RELOAD: Rightmost. Requires confirmation.
      - LAP/RESET: 
         * WHILE MEASURING (swState=1): Records lap instantly. NO ALERT. NO FREEZE.
         * WHILE STOPPED (swState!=1): Requires confirmation to reload/reset.

   3. DISPLAY LOGIC (FREEZE):
      - AUTO LAP (GPS line hit): Freezes time display for 15 seconds.
      - MANUAL LAP (Button press): NO FREEZE. Next lap starts counting immediately.
   
   4. DATA LOGIC (V9.0.0 MULTI-BEST):
      - HISTORY: Newest laps at the TOP.
      - MULTI-BEST: HISTORY画面にて、S1/S2/S3/TIME/MAX SPD/MAX RPMの各項目で
        セッション中のベスト値を個別に赤色ハイライトする。
      - MAP WARNING: MAP button turns ORANGE if 'startLineP1Lat', 'cooldown', or 'thresh' is missing.
   
   5. USB CONFIG: Uses 'usb_interface' and 'usb_endpoint' from LocalStorage.
   ========================================================================== */

'use strict';
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b", PULSE_UUID = "f4deb353-a4cf-4ffb-badb-2a5f2e3bb630";
let swState = 0, startTime = 0, lapStartTime = 0, lapRecords = [], gpsPoints = [];
let currentRPM = 0, currentTemp = 0, device = null, nmeaBuffer = '', lastPos = null;
let lines = { startLine: null, s1Line: null, s2Line: null, s3Line: null };
let currentSpeedKmh = 0, maxSpeedInLap = 0, maxRpmInLap = 0;
let isFrozen = false, freezeDisplayTime = "", freezeUntil = 0;
let pulsePerRev = 1, cooldownMs = 30000, gpsThreshold = 0.0001;

const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

function parseNMEA(line) {
    if (line.includes('RMC') || line.includes('GGA')) {
        const p = line.split(',');
        let hasFix = false;
        if (line.includes('RMC') && p[2] === 'A') {
            hasFix = true;
            currentSpeedKmh = parseFloat(p[7]) * 1.852;
            if (currentSpeedKmh > maxSpeedInLap) maxSpeedInLap = Math.round(currentSpeedKmh);
        }
        if (line.includes('GGA') && (p[6] !== '0' && p[6] !== '')) {
            hasFix = true;
            const lat = dmmToDec(p[2], p[3]), lon = dmmToDec(p[4], p[5]);
            const cur = { lat, lon, rpm: currentRPM, time: Date.now() };
            if (swState === 1) gpsPoints.push(cur);
            if (swState === 1 && lastPos) {
                const hit = getIntersection(lastPos, cur, lines.startLine);
                if (hit && (hit - (lapStartTime || startTime) > cooldownMs)) processLap(hit, 15000);
                ['s1Line','s2Line','s3Line'].forEach(s => {
                    if (lines[s]) {
                        const hitS = getIntersection(lastPos, cur, lines[s]);
                        if (hitS && lapStartTime > 0) document.getElementById(s.replace('Line', '') + '_val').textContent = ((hitS - lapStartTime)/1000).toFixed(2);
                    }
                });
            }
            lastPos = cur;
        }
        if (hasFix) document.getElementById('usbGpsBtn').classList.add('active');
    }
}

function updateLapList() {
    if (lapRecords.length === 0) return;
    const bestTime = Math.min(...lapRecords.map(r => r.time));
    document.getElementById('lap').innerHTML = lapRecords.map(r => {
        const isBest = r.time === bestTime && lapRecords.length > 1;
        return `<div class="lap-row ${isBest ? 'best-lap' : ''}"><span>L${r.no}</span><span>${timeFormat(r.time)}</span></div>`;
    }).join('');
}

function processLap(t, freezeMs) {
    const now = t || Date.now();
    const lapTime = now - (lapStartTime || startTime);
    const lapData = { no: lapRecords.length + 1, time: lapTime, max: Math.round(maxSpeedInLap), maxRpm: Math.round(maxRpmInLap), s1: document.getElementById('s1_val').textContent, s2: document.getElementById('s2_val').textContent, s3: document.getElementById('s3_val').textContent };
    lapRecords.unshift(lapData);
    updateLapList();
    if (freezeMs > 0) { isFrozen = true; freezeDisplayTime = timeFormat(lapTime); freezeUntil = Date.now() + freezeMs; }
    else { isFrozen = false; }
    lapStartTime = now; maxSpeedInLap = 0; maxRpmInLap = 0;
    ['s1_val','s2_val','s3_val'].forEach(id => document.getElementById(id).textContent = "--.--");
}

document.getElementById('startBtn').onclick = function() {
    if (swState !== 1) { 
        swState = 1; startTime = Date.now(); lapStartTime = 0; lapRecords = []; gpsPoints = []; maxRpmInLap = 0;
        this.classList.add('active'); document.getElementById('gpxBtn').style.display = 'none'; tick(); 
    } else { 
        swState = 2; this.classList.remove('active'); document.getElementById('gpxBtn').style.display = 'block'; 
    }
};

document.getElementById('lapBtn').onclick = function() {
    if (swState === 1) processLap(Date.now(), 0); 
    else if(confirm("データを破棄してリセットしますか？")) location.reload();
};

document.getElementById('usbGpsBtn').onclick = async function() {
    try {
        const iface = parseInt(localStorage.getItem('usb_interface')) || 1;
        const ep = parseInt(localStorage.getItem('usb_endpoint')) || 2;
        device = await navigator.usb.requestDevice({ filters: [] });
        await device.open();
        await device.selectConfiguration(1);
        await device.claimInterface(iface);
        while (device) {
            const res = await device.transferIn(ep, 512);
            const linesN = (nmeaBuffer + new TextDecoder().decode(res.data)).split(/\r?\n/);
            nmeaBuffer = linesN.pop();
            linesN.forEach(parseNMEA);
        }
    } catch (e) { document.getElementById('usbGpsBtn').classList.remove('active'); }
};

document.getElementById('reloadBtn').onclick = () => { if(confirm("データを破棄してリロードしますか？")) location.reload(); };

document.getElementById('historyBtn').onclick = () => {
    if (lapRecords.length === 0) return;
    
    // 各項目のベスト値を算出
    const getBestNumeric = (key, type) => {
        const vals = lapRecords.map(r => {
            const v = parseFloat(r[key]);
            return isNaN(v) ? (type === 'min' ? Infinity : -1) : v;
        });
        return type === 'min' ? Math.min(...vals) : Math.max(...vals);
    };

    const bestS1 = getBestNumeric('s1', 'min');
    const bestS2 = getBestNumeric('s2', 'min');
    const bestS3 = getBestNumeric('s3', 'min');
    const bestTime = Math.min(...lapRecords.map(r => r.time));
    const bestMaxSpd = getBestNumeric('max', 'max');
    const bestMaxRpm = getBestNumeric('maxRpm', 'max');

    document.getElementById('history-body').innerHTML = lapRecords.map(r => {
        const isBestS1 = parseFloat(r.s1) === bestS1;
        const isBestS2 = parseFloat(r.s2) === bestS2;
        const isBestS3 = parseFloat(r.s3) === bestS3;
        const isBestTime = r.time === bestTime;
        const isBestSpd = r.max === bestMaxSpd && r.max > 0;
        const isBestRpm = r.maxRpm === bestMaxRpm && r.maxRpm > 0;

        return `
            <tr style="${isBestTime ? 'background: rgba(228,0,43,0.1);' : ''}">
                <td>${r.no}</td>
                <td class="${isBestS1 ? 'best-lap' : ''}">${r.s1}</td>
                <td class="${isBestS2 ? 'best-lap' : ''}">${r.s2}</td>
                <td class="${isBestS3 ? 'best-lap' : ''}">${r.s3}</td>
                <td class="${isBestTime ? 'best-lap' : ''}">${timeFormat(r.time)}</td>
                <td class="${isBestSpd ? 'best-lap' : ''}">${r.max}</td>
                <td class="${isBestRpm ? 'best-lap' : ''}">${r.maxRpm}</td>
            </tr>`;
    }).join('');
    document.getElementById('history-page').style.display = 'block';
};

document.getElementById('gpxBtn').onclick = () => {
    if (gpsPoints.length === 0) return;
    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="KLAP"><trk><trkseg>`;
    gpsPoints.forEach(p => { gpx += `<trkpt lat="${p.lat}" lon="${p.lon}"><time>${new Date(p.time).toISOString()}</time><extensions><rpm>${Math.round(p.rpm)}</rpm></extensions></trkpt>`; });
    gpx += `</trkseg></trk></gpx>`;
    const blob = new Blob([gpx], { type: 'application/gpx+xml' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `log_${Date.now()}.gpx`; a.click();
};

function tick() {
    if (swState !== 1) return;
    if (currentRPM > maxRpmInLap) maxRpmInLap = Math.round(currentRPM);
    const now = Date.now();
    document.getElementById('display').textContent = "TOTAL " + timeFormat(now - startTime);
    const d1 = document.getElementById('display1');
    if (isFrozen && now < freezeUntil) d1.textContent = freezeDisplayTime;
    else d1.textContent = timeFormat(now - (lapStartTime || startTime));
    requestAnimationFrame(tick);
}

function drawTacho(rpm) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height, segments = 75, active = Math.floor((rpm / 14000) * segments);
    const sX = 20, hY = 80, bY = h - 20, rad = bY - hY, curveEnd = 30;
    for (let i = 0; i <= segments; i++) {
        let x, y, ang, prog;
        if (i <= curveEnd) { prog = i / curveEnd; ang = Math.PI + (prog * (Math.PI / 2)); x = sX + rad + Math.cos(ang) * rad; y = hY + rad + Math.sin(ang) * rad; }
        else { prog = (i - curveEnd) / (segments - curveEnd); x = (sX + rad) + (prog * (w - 15 - (sX + rad))); y = hY; ang = 1.5 * Math.PI; }
        if (i % 10 === 0 || i === segments) { ctx.save(); ctx.fillStyle = i < active ? "#fff" : "#444"; ctx.font = "italic bold 22px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.round((i / segments) * 14), x + Math.cos(ang) * 45, y + Math.sin(ang) * 45); ctx.restore(); }
        if (i < segments) { ctx.fillStyle = i < active ? (((i/segments)*14000) >= 12500 ? "#E4002B" : (((i/segments)*14000) >= 8000 ? "#004098" : "#FFFFFF")) : "#222"; ctx.save(); ctx.translate(x, y); ctx.rotate(ang + Math.PI / 2); ctx.fillRect(-5, -23, 10, 46); ctx.restore(); }
    }
    document.getElementById('rpm_val').textContent = Math.floor(rpm);
    document.getElementById('speed_val').textContent = Math.round(currentSpeedKmh);
    document.getElementById('max_speed_val').textContent = maxSpeedInLap;
}

document.getElementById('btConnect').onclick = async function() {
    try {
        const ble = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        const server = await ble.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const pC = await service.getCharacteristic(PULSE_UUID);
        await pC.startNotifications();
        this.classList.add('active');
        pC.oncharacteristicvaluechanged = (e) => { 
            const data = e.target.value; 
            currentRPM = (data.getUint16(0, true) * 60) / pulsePerRev; 
            currentTemp = data.getUint8(2); 
            document.getElementById('temp_val').textContent = currentTemp; 
        };
    } catch (e) { this.classList.remove('active'); }
};

function getIntersection(p1, p2, line) { if (!line) return null; const x1=p1.lon, y1=p1.lat, x2=p2.lon, y2=p2.lat, x3=line.p2.lon, y3=line.p2.lat, x4=line.p1.lon, y4=line.p1.lat; const den = (y4-y3)*(x2-x1)-(x4-x3)*(y2-y1); if (Math.abs(den)<1e-12) return null; const t = ((x4-x3)*(y1-y3)-(y4-y3)*(x1-x3))/den; return (t>=0 && t<=1) ? p1.time+(p2.time-p1.time)*t : null; }
function dmmToDec(d, dir){ if(!d) return 0; const dot=d.indexOf('.'); const deg=parseInt(d.substring(0,dot-2)), min=parseFloat(d.substring(dot-2)); const dec=deg+(min/60); return (dir==='S'||dir==='W')?-dec:dec; }
function timeFormat(ms){ if(ms===Infinity||ms<0)return "--:--.---"; const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), mss=Math.floor(ms%1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${mss.toString().padStart(3,'0')}`; }

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 60; };
window.onload = () => {
    window.dispatchEvent(new Event('resize'));
    pulsePerRev = parseFloat(localStorage.getItem('pl1')) || 1;
    cooldownMs = parseInt(localStorage.getItem('cooldown')) || 30000;
    const tVal = localStorage.getItem('thresh');
    gpsThreshold = tVal ? parseFloat(tVal) / 100000 : 0.0001;

    const ck = (k) => localStorage.getItem(k) !== null;
    if (!ck('startLineP1Lat') || !ck('cooldown') || !ck('thresh')) {
        document.getElementById('mapBtn').classList.add('config-missing');
    }

    ['startLine', 's1Line', 's2Line', 's3Line'].forEach(key => {
        const p1Lat = localStorage.getItem(key + 'P1Lat');
        if (p1Lat) {
            lines[key] = { p1: { lat: parseFloat(p1Lat), lon: parseFloat(localStorage.getItem(key + 'P1Lon')) }, p2: { lat: parseFloat(localStorage.getItem(key + 'P2Lat')), lon: parseFloat(localStorage.getItem(key + 'P2Lon')) } };
            if (key !== 'startLine') document.getElementById(key.replace('Line', '') + '_box').style.display = 'block';
        }
    });
    (function anim(){ drawTacho(currentRPM); requestAnimationFrame(anim); })();
};
</script>
</body>
</html>
