<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLAP_DEGI_USB - V8.6.2</title>
    <style>
        :root { --hrc-red: #E4002B; --hrc-white: #ffffff; --bg-dark: #000000; --hrc-orange: #FFA500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--hrc-white); font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #dashboard { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100vw; }
        
        /* メインキャンバス */
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 45px); z-index: 1; }
        
        .main-ui-container { position: absolute; right: 10px; top: 160px; bottom: 55px; display: flex; align-items: flex-start; gap: 40px; z-index: 20; }
        #info-overlay { display: flex; flex-direction: column; align-items: flex-end; text-align: right; gap: 5px; }
        #rpm_val { font-size: 12vh; font-weight: 900; line-height: 0.8; text-shadow: 3px 3px 12px #000; }
        #display1 { font-size: 16vh; font-weight: 900; line-height: 0.9; color: var(--hrc-white); text-shadow: 4px 4px 15px #000; }
        
        /* セクター表示 */
        #sector-container { display: flex; justify-content: flex-end; gap: 15px; font-size: 4vh; font-weight: 900; height: 5vh; margin-top: 5px; }
        .sec-box { display: none; text-shadow: 2px 2px 10px #000; }
        .sec-val { color: var(--hrc-white); min-width: 2.2em; }
        #display { font-size: 3.5vh; color: #bbb; text-shadow: 1px 1px 6px #000; margin-top: 5px; }

        /* 右側パネル */
        .right-panels { display: flex; flex-direction: row; gap: 15px; height: 100%; align-items: flex-start; }
        #lap-panel { width: 160px; height: 100%; overflow: hidden; }
        #lap { height: 100%; overflow-y: auto; scrollbar-width: none; }
        .lap-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 18px; font-weight: 900; border: none !important; }
        .best-lap { color: var(--hrc-red) !important; }

        .data-panel { display: flex; flex-direction: column; gap: 12px; width: 100px; }
        .data-box { display: flex; flex-direction: column; align-items: flex-end; }
        .label { font-size: 10px; color: var(--hrc-red); font-weight: bold; }
        .val { font-size: 36px; font-weight: 900; line-height: 0.9; }

        /* 履歴ページ */
        #history-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #history-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #111; padding: 10px; border-radius: 5px; border: 1px solid #333; text-align: center; }
        .summary-item { font-size: 14px; font-weight: bold; }
        .summary-label { font-size: 9px; color: var(--hrc-red); display: block; }
        
        #history-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
        #history-table th { color: var(--hrc-red); font-size: 10px; padding: 8px 2px; border-bottom: 2px solid var(--hrc-red); }
        #history-table td { padding: 12px 2px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #history-close { position: sticky; top: 0; background: var(--hrc-red); padding: 12px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 4px; z-index: 2001; margin-bottom: 10px; }

        /* フッター */
        footer { height: 40px; display: flex; gap: 3px; padding: 3px; background: #000; border-top: 1px solid #333; z-index: 100; position: fixed; bottom: 0; left: 0; right: 0; }
        button { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 8px; font-weight: bold; cursor: pointer; }
        button.active { background: var(--hrc-red) !important; color: #fff !important; }
        #saveLogBtn { background: #28a745; display: none; }
    </style>
</head>
<body>

<div id="dashboard">
    <canvas id="canvas"></canvas>
    <div class="main-ui-container">
        <div id="info-overlay">
            <div id="rpm_val">0</div>
            <div id="display1">00:00.000</div>
            <div id="sector-container">
                <div id="s1_box" class="sec-box">S1:<span id="s1_val" class="sec-val">--.--</span></div>
                <div id="s2_box" class="sec-box">S2:<span id="s2_val" class="sec-val">--.--</span></div>
                <div id="s3_box" class="sec-box">S3:<span id="s3_val" class="sec-val">--.--</span></div>
            </div>
            <div id="display">TOTAL 00:00.000</div>
        </div>
        <div class="right-panels">
            <div id="lap-panel"><div id="lap"></div></div>
            <div class="data-panel">
                <div class="data-box"><div class="label">SPEED</div><div class="val" id="speed_val">0</div></div>
                <div class="data-box"><div class="label">MAX</div><div class="val" id="max_speed_val" style="color: #FFA500;">0</div></div>
                <div class="data-box"><div class="label">TEMP</div><div class="val" id="temp_val">--</div></div>
            </div>
        </div>
    </div>
    <footer>
        <button id="usbGpsBtn">USB GPS</button>
        <button id="btConnect">BLE START</button>
        <button id="startBtn">TIMER</button>
        <button id="lapBtn">LAP/RESET</button>
        <button id="historyBtn">HISTORY</button>
        <button id="saveLogBtn">LOG SAVE</button>
        <button id="reloadBtn">RELOAD</button>
    </footer>
</div>

<div id="history-page">
    <div id="history-close">CLOSE HISTORY</div>
    <div id="history-summary">
        <div class="summary-item"><span class="summary-label">BEST LAP</span><span id="sum-best">--:--.---</span></div>
        <div class="summary-item"><span class="summary-label">MAX SPEED</span><span id="sum-max">0</span> km/h</div>
        <div class="summary-item"><span class="summary-label">TOTAL LAPS</span><span id="sum-laps">0</span></div>
    </div>
    <table id="history-table">
        <thead>
            <tr><th>L</th><th>S1</th><th>S2</th><th>S3</th><th>TIME</th><th>MAX</th></tr>
        </thead>
        <tbody id="history-body"></tbody>
    </table>
    <div style="text-align: center; color: #666; font-size: 10px; margin-top: 20px;">※タップしてラップを削除</div>
</div>

<script>
'use strict';
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b", PULSE_UUID = "f4deb353-a4cf-4ffb-badb-2a5f2e3bb630";
let swState = 0, startTime = 0, lapStartTime = 0, lastLapTime = 0, lapRecords = [];
let currentRPM = 0, currentTemp = 0, currentSpeedKmh = 0, maxSpeedInLap = 0, sessionBest = Infinity, sessionMaxSpeed = 0;
let lastUsbDataTime = 0, lastBleDataTime = 0, usbWaiting = false, bleWaiting = false;
let isFrozen = false, freezeDisplayTime = "", freezeStartTime = 0;
let device = null, nmeaBuffer = '', lastPos = null;
let lines = { start: {p1:null,p2:null}, s1: {p1:null,p2:null}, s2: {p1:null,p2:null}, s3: {p1:null,p2:null} };
let trackLogs = [], currentLapLog = [];

const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
const rpmElement = document.getElementById('rpm_val');
const speedElement = document.getElementById('speed_val');

// BLE
document.getElementById('btConnect').onclick = async function() {
    try {
        const ble = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        const server = await ble.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const pC = await service.getCharacteristic(PULSE_UUID);
        await pC.startNotifications();
        bleWaiting = true;
        const pl1 = parseInt(localStorage.getItem('pl1')) || 1;
        pC.oncharacteristicvaluechanged = (e) => {
            const data = e.target.value;
            lastBleDataTime = Date.now();
            currentRPM = (data.getUint16(0, true) * 60) / pl1;
            currentTemp = data.getUint8(2);
        };
    } catch (e) { bleWaiting = false; }
};

// Drawing
function drawTacho(rpm) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height, segments = 75, active = Math.floor((rpm / 14000) * segments);
    const sX = 20, hY = 80, bY = h - 20, rad = bY - hY, curveEnd = 30;
    for (let i = 0; i <= segments; i++) {
        let x, y, ang, prog;
        if (i <= curveEnd) { prog = i / curveEnd; ang = Math.PI + (prog * (Math.PI / 2)); x = sX + rad + Math.cos(ang) * rad; y = hY + rad + Math.sin(ang) * rad; }
        else { prog = (i - curveEnd) / (segments - curveEnd); x = (sX + rad) + (prog * (w - 15 - (sX + rad))); y = hY; ang = 1.5 * Math.PI; }
        if (i % 10 === 0 || i === segments) { ctx.fillStyle = i < active ? "#fff" : "#444"; ctx.font = "italic bold 22px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.round((i / segments) * 14), x + Math.cos(ang) * 45, y + Math.sin(ang) * 45); }
        if (i < segments) { ctx.fillStyle = i < active ? (((i/segments)*14000) >= 12500 ? "#E4002B" : (((i/segments)*14000) >= 8000 ? "#004098" : "#FFFFFF")) : "#222"; ctx.save(); ctx.translate(x, y); ctx.rotate(ang + Math.PI / 2); ctx.fillRect(-5, -23, 10, 46); ctx.restore(); }
    }
    rpmElement.textContent = Math.floor(rpm);
    speedElement.textContent = Math.round(currentSpeedKmh);
    document.getElementById('temp_val').textContent = currentTemp;
}

function renderLoop() { drawTacho(currentRPM); requestAnimationFrame(renderLoop); }

// GPS
function parseNMEA(line) {
    const p = line.split(',');
    if (line.includes('RMC') && p[2] === 'A') {
        lastUsbDataTime = Date.now();
        currentSpeedKmh = parseFloat(p[7]) * 1.852;
        if (currentSpeedKmh > maxSpeedInLap) maxSpeedInLap = Math.round(currentSpeedKmh);
        if (currentSpeedKmh > sessionMaxSpeed) sessionMaxSpeed = Math.round(currentSpeedKmh);
    }
    if (line.includes('GGA') && p[6] !== '0') {
        const cur = { lat: dmmToDec(p[2], p[3]), lon: dmmToDec(p[4], p[5]), time: Date.now() };
        if (swState === 1) currentLapLog.push({...cur, speed: currentSpeedKmh, rpm: currentRPM});
        lastPos = cur;
    }
}
function dmmToDec(d, dir){ if(!d || d.indexOf('.')===-1) return 0; const dot=d.indexOf('.'); const deg=parseInt(d.substring(0,dot-2)), min=parseFloat(d.substring(dot-2)); let dec=deg+(min/60); return (dir==='S'||dir==='W')?-dec:dec; }
function timeFormat(ms){ if(ms === Infinity) return "--:--.---"; let m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), mss=Math.floor(ms%1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${mss.toString().padStart(3,'0')}`; }

// Lap Logic
function processLap(t, f) {
    const now = t || Date.now();
    const lapTime = now - (lapStartTime || startTime);
    if (lapTime < 1000) return;
    
    const record = {
        time: lapTime,
        max: maxSpeedInLap,
        s1: document.getElementById('s1_val').textContent,
        s2: document.getElementById('s2_val').textContent,
        s3: document.getElementById('s3_val').textContent
    };
    
    lapRecords.unshift(record);
    trackLogs.push([...currentLapLog]);
    refreshBestTime();
    
    lapStartTime = now;
    maxSpeedInLap = 0;
    currentLapLog = [];
    
    ['s1_val','s2_val','s3_val'].forEach(id => document.getElementById(id).textContent = "--.--");
    updateLapList();
    if (f) { isFrozen = true; freezeDisplayTime = timeFormat(lapTime); freezeStartTime = Date.now(); }
}

function refreshBestTime() {
    if (lapRecords.length === 0) { sessionBest = Infinity; return; }
    sessionBest = Math.min(...lapRecords.map(r => r.time));
}

function updateLapList() {
    const d = document.getElementById('lap'); d.innerHTML = "";
    lapRecords.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = `lap-row ${r.time === sessionBest ? 'best-lap' : ''}`;
        div.innerHTML = `<span>L${lapRecords.length-i}</span><span>${timeFormat(r.time)}</span>`;
        d.appendChild(div);
    });
}

function tick() { 
    if (swState !== 1) return;
    const now = Date.now();
    document.getElementById('display').textContent = "TOTAL " + timeFormat(now - startTime);
    const d1 = document.getElementById('display1');
    if (isFrozen) { d1.textContent = freezeDisplayTime; if (now - freezeStartTime > 15000) isFrozen = false; }
    else { d1.textContent = lapStartTime > 0 ? timeFormat(now - lapStartTime) : "00:00.000"; }
    setTimeout(tick, 30);
}

// History & Summary
document.getElementById('historyBtn').onclick = () => {
    const body = document.getElementById('history-body');
    body.innerHTML = "";
    document.getElementById('sum-best').textContent = timeFormat(sessionBest);
    document.getElementById('sum-max').textContent = sessionMaxSpeed;
    document.getElementById('sum-laps').textContent = lapRecords.length;

    lapRecords.forEach((r, i) => {
        const lapNum = lapRecords.length - i;
        const tr = document.createElement('tr');
        tr.onclick = () => { if(confirm(`L${lapNum} を削除しますか？`)) { lapRecords.splice(i,1); trackLogs.splice(i,1); refreshBestTime(); document.getElementById('historyBtn').click(); updateLapList(); } };
        tr.innerHTML = `
            <td>${lapNum}</td>
            <td>${r.s1}</td>
            <td>${r.s2}</td>
            <td>${r.s3}</td>
            <td style="font-weight:bold; color:${r.time===sessionBest?'var(--hrc-red)':'#fff'}">${timeFormat(r.time)}</td>
            <td>${r.max}</td>`;
        body.appendChild(tr);
    });
    document.getElementById('history-page').style.display = 'block';
};

document.getElementById('history-close').onclick = () => document.getElementById('history-page').style.display = 'none';

// Others
document.getElementById('startBtn').onclick = function(){
    if(swState!==1){ swState=1; startTime=Date.now(); lapStartTime=0; this.className='active'; tick(); }
    else { swState=2; this.className=''; document.getElementById('saveLogBtn').style.display='block'; }
};
document.getElementById('lapBtn').onclick = () => {
    if(swState===1) processLap(Date.now(), true);
    else if(confirm("データをリセットしますか？")){ swState=0; lapRecords=[]; trackLogs=[]; currentLapLog=[]; sessionBest=Infinity; sessionMaxSpeed=0; isFrozen=false; updateLapList(); }
};
document.getElementById('usbGpsBtn').onclick = async () => {
    try {
        device = await navigator.usb.requestDevice({ filters: [] });
        await device.open(); await device.selectConfiguration(1); await device.claimInterface(1);
        usbWaiting = true;
        while (device) {
            const res = await device.transferIn(2, 512);
            const linesN = (nmeaBuffer + new TextDecoder().decode(res.data)).split(/\r?\n/);
            nmeaBuffer = linesN.pop(); linesN.forEach(parseNMEA);
        }
    } catch (e) { usbWaiting = false; }
};
document.getElementById('reloadBtn').onclick = () => location.reload();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 45; };
window.onload = () => { window.dispatchEvent(new Event('resize')); renderLoop(); };
</script>
</body>
</html>
