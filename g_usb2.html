<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KLAP_DEGI_USB - PRECISION V6.7</title>
    <style>
        :root { 
            --hrc-red: #E4002B; --hrc-blue: #004098; --hrc-white: #ffffff; 
            --bg-dark: #000000; --hrc-orange: #FFA500;
            --btn-bg: #1a1a1a; --btn-border: #444;
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg-dark); color: var(--hrc-white); 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
        }
        #dashboard { position: relative; display: flex; flex-direction: column; height: 100dvh; width: 100vw; }
        #history-page { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; 
            background: #0a0a0a; z-index: 999; overflow-y: auto; box-sizing: border-box;
        }
        #canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: calc(100% - 60px) !important; z-index: 1; }
        
        .main-ui-container {
            position: absolute; right: 10px; top: 120px; bottom: 70px; 
            display: flex; align-items: flex-start; gap: 45px; z-index: 20;
        }
        #info-overlay { display: flex; flex-direction: column; align-items: flex-end; text-align: right; gap: 2px; }
        #rpm_val { font-size: 13vh; font-weight: 900; line-height: 0.8; margin-top: 10px; text-shadow: 3px 3px 12px #000; }
        #display1 { font-size: 18vh; font-weight: 900; line-height: 0.9; color: var(--hrc-white); text-shadow: 4px 4px 15px #000; }
        
        #sector-container { 
            display: flex; justify-content: flex-end; gap: 25px; 
            font-size: 5.8vh; font-weight: 900; height: 7vh; 
            text-shadow: 2px 2px 10px #000; margin-bottom: 5px;
        }
        /* セクターボックスの初期状態は非表示、データがあればJSで表示 */
        #s1_box, #s2_box, #s3_box { display: none; }
        .sec-unit { color: #ffffff !important; margin-right: 4px; }
        .sec-val { color: #ffffff; min-width: 2.2em; text-align: left; }
        .sec-best { color: var(--hrc-orange) !important; }
        #display { font-size: 4vh; color: #bbb; text-shadow: 1px 1px 6px #000; }

        .right-panels { display: flex; flex-direction: row; gap: 15px; height: 100%; align-items: flex-start; }
        #lap-panel { width: 175px; height: 100%; display: flex; flex-direction: column; overflow: hidden; border-top: 2px solid #333; }
        #lap { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .lap-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 18px; font-weight: 900; }
        .best-lap { color: var(--hrc-red); }

        .data-panel { display: flex; flex-direction: column; gap: 15px; width: 110px; }
        .data-box { display: flex; flex-direction: column; align-items: flex-end; }
        .label { font-size: 11px; color: var(--hrc-red); font-weight: bold; }
        .val { font-size: 40px; font-weight: 900; line-height: 0.9; }

        footer { 
            height: 55px; display: flex; gap: 4px; padding: 4px; background: #000; border-top: 1px solid #333; 
            z-index: 100; position: fixed; bottom: 0; left: 0; right: 0;
        }
        button { 
            flex: 1; background: var(--btn-bg); color: #fff; border: 1px solid var(--btn-border); 
            border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button.active { background: var(--hrc-red) !important; }
        #backBtn { width: 100%; height: 70px; font-size: 24px; font-weight: 900; background: var(--hrc-blue); color: #fff; border: none; border-radius: 8px; margin-top: 20px;}
        
        .val-best { color: var(--hrc-orange); }
        table { width: 100%; border-collapse: collapse; color: white; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
        th { color: var(--hrc-red); }
    </style>
</head>
<body>

<div id="dashboard">
    <canvas id="canvas"></canvas>
    <div class="main-ui-container">
        <div id="info-overlay">
            <div id="rpm_val">0</div>
            <div id="display1">00:00.000</div>
            <div id="sector-container">
                <div id="s1_box"><span class="sec-unit">S1:</span><span id="s1_val" class="sec-val">--.--</span></div>
                <div id="s2_box"><span class="sec-unit">S2:</span><span id="s2_val" class="sec-val">--.--</span></div>
                <div id="s3_box"><span class="sec-unit">S3:</span><span id="s3_val" class="sec-val">--.--</span></div>
            </div>
            <div id="display">TOTAL 00:00.000</div>
        </div>
        <div class="right-panels">
            <div id="lap-panel"><div id="lap"></div></div>
            <div class="data-panel">
                <div class="data-box"><div class="label">SPEED</div><div class="val" id="speed_val">0</div></div>
                <div class="data-box"><div class="label">MAX</div><div class="val" id="max_speed_val" style="color: #FFA500;">0</div></div>
                <div class="data-box"><div class="label">TEMP</div><div class="val" id="temp_val">--</div></div>
            </div>
        </div>
    </div>
    <footer>
        <button id="usbGpsBtn">USB GPS</button>
        <button id="btConnect">BLE START</button>
        <button id="startBtn">TIMER</button>
        <button id="lapBtn">LAP/RESET</button>
        <button id="historyBtn">HISTORY</button>
        <button id="reloadBtn">RELOAD</button>
    </footer>
</div>

<div id="history-page">
    <div style="padding: 20px;">
        <h2 style="color: var(--hrc-red);">SESSION HISTORY</h2>
        <table id="history-table">
            <thead><tr><th>LAP</th><th>S1</th><th>S2</th><th>S3</th><th>TIME</th><th>MAX RPM</th><th>SPD</th></tr></thead>
            <tbody id="history-body"></tbody>
        </table>
        <button id="backBtn">BACK TO DASHBOARD</button>
    </div>
</div>

<script>
'use strict';
// --- グローバル変数 ---
let swState = 0, startTime = 0, lapStartTime = 0, lastLapTime = 0;
let lapRecords = [], currentRPM = 0, maxSpeed = 0, lapMaxRpm = 0;
let isFrozen = false, freezeDisplayTime = "", freezeStartTime = 0;
let targets = {}; // 座標データ保持用
let lastPassTimes = { startLine: 0, s1Line: 0, s2Line: 0, s3Line: 0 }; // 独立クールダウン用
let bestSectors = { s1: Infinity, s2: Infinity, s3: Infinity };

const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

// 座標読み込み（設定ツールで保存したデータを反映）
function loadTargets() {
    const keys = ['startLine', 's1Line', 's2Line', 's3Line'];
    keys.forEach(k => {
        const lat1 = localStorage.getItem(k + 'P1Lat'), lon1 = localStorage.getItem(k + 'P1Lon');
        const lat2 = localStorage.getItem(k + 'P2Lat'), lon2 = localStorage.getItem(k + 'P2Lon');
        if (lat1 && lat2) {
            targets[k] = { 
                p1: { lat: parseFloat(lat1), lon: parseFloat(lon1) }, 
                p2: { lat: parseFloat(lat2), lon: parseFloat(lon2) } 
            };
            // S1~S3の枠を表示
            if (k !== 'startLine') document.getElementById(k.replace('Line','_box')).style.display = 'block';
        }
    });
}

function timeFormat(ms) { 
    if (ms < 0) ms = 0;
    let m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000), mss = Math.floor(ms%1000); 
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${mss.toString().padStart(3,'0')}`; 
}

// セクター通過時の処理
function onSectorPass(key, now) {
    const sectorMs = now - (lastPassTimes.prev || lapStartTime);
    lastPassTimes.prev = now; // 次のセクター計算用
    const secVal = (sectorMs / 1000).toFixed(2);
    const id = key.replace('Line', '_val');
    const el = document.getElementById(id);
    
    if (el) {
        el.textContent = secVal;
        // ベスト更新判定
        const sKey = key.replace('Line','').toLowerCase();
        if (sectorMs < bestSectors[sKey]) {
            bestSectors[sKey] = sectorMs;
            el.classList.add('sec-best');
        } else {
            el.classList.remove('sec-best');
        }
    }
}

// ラップ通過（スタートライン）時の処理
function processLap(exactTime, useFreeze) {
    if (swState !== 1) return;
    const lapTime = exactTime - lapStartTime;
    
    // セクター3の最終処理（S2通過からゴールまでをS3とする場合）
    if (lastPassTimes.s2Line > 0 && lastPassTimes.s2Line > lapStartTime) {
        onSectorPass('s3Line', exactTime);
    }

    const s1 = parseFloat(document.getElementById('s1_val').textContent) || 0;
    const s2 = parseFloat(document.getElementById('s2_val').textContent) || 0;
    const s3 = parseFloat(document.getElementById('s3_val').textContent) || 0;

    lapRecords.unshift({ time: lapTime, s1, s2, s3, maxRpm: lapMaxRpm, maxSpeed: maxSpeed });
    
    // リセット
    lapStartTime = exactTime;
    lastPassTimes.prev = exactTime; 
    lapMaxRpm = 0; maxSpeed = 0;

    // 表示更新
    updateLapList();
    if (useFreeze) {
        isFrozen = true;
        freezeDisplayTime = timeFormat(lapTime);
        freezeStartTime = Date.now();
    }
    // セクター表示リセット（次の周のため）
    setTimeout(() => {
        ["s1_val", "s2_val", "s3_val"].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.textContent = "--.--";
        });
    }, 2000);
}

function updateLapList() {
    const d = document.getElementById('lap'); d.innerHTML = "";
    if (lapRecords.length === 0) return;
    const bestTime = Math.min(...lapRecords.map(r => r.time));
    lapRecords.forEach((r, i) => {
        const row = document.createElement('div');
        row.className = `lap-row ${r.time === bestTime ? 'best-lap' : ''}`;
        row.innerHTML = `<span>L${lapRecords.length-i}</span><span>${timeFormat(r.time)}</span>`;
        d.appendChild(row);
    });
}

// 2点間の距離と座標からラインとの最短距離を計算 (点と線分の距離)
function getDistanceToLine(lat, lon, p1, p2) {
    const y = lat, x = lon;
    const y1 = p1.lat, x1 = p1.lon, y2 = p2.lat, x2 = p2.lon;
    const R = 6371000;
    const dx = (x2 - x1) * Math.cos(y1 * Math.PI / 180) * (R * Math.PI / 180);
    const dy = (y2 - y1) * (R * Math.PI / 180);
    const dpx = (x - x1) * Math.cos(y1 * Math.PI / 180) * (R * Math.PI / 180);
    const dpy = (y - y1) * (R * Math.PI / 180);
    const l2 = dx*dx + dy*dy;
    if (l2 === 0) return Math.sqrt(dpx*dpx + dpy*dpy);
    let t = (dpx * dx + dpy * dy) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.sqrt(Math.pow(dpx - t * dx, 2) + Math.pow(dpy - t * dy, 2));
}

// GPSデータ受信時のメインロジック
function onGpsUpdate(lat, lon, speedKmh) {
    if (swState !== 1) return;
    const now = Date.now();
    const thresh = parseFloat(localStorage.getItem('thresh')) || 20;
    const cooldownMs = parseInt(localStorage.getItem('cooldown')) || 20000;

    document.getElementById('speed_val').textContent = Math.round(speedKmh);
    if (speedKmh > maxSpeed) maxSpeed = Math.round(speedKmh);
    document.getElementById('max_speed_val').textContent = maxSpeed;

    for (const key in targets) {
        const dist = getDistanceToLine(lat, lon, targets[key].p1, targets[key].p2);
        
        // 独立クールダウン判定
        if (dist < thresh && (now - lastPassTimes[key] > cooldownMs)) {
            lastPassTimes[key] = now; // このラインのみロック
            
            if (key === 'startLine') {
                processLap(now, true);
            } else {
                onSectorPass(key, now);
            }
            break; 
        }
    }
}

// --- ボタン・タイマー制御 ---
document.getElementById('startBtn').onclick = function() {
    if (swState !== 1) {
        swState = 1; startTime = Date.now(); lapStartTime = startTime;
        lastPassTimes.prev = startTime;
        this.classList.add('active');
        tick();
    } else {
        swState = 2;
        this.classList.remove('active');
    }
};

document.getElementById('lapBtn').onclick = () => {
    if (swState === 1) processLap(Date.now(), false);
    else location.reload();
};

document.getElementById('historyBtn').onclick = () => {
    const body = document.getElementById('history-body'); body.innerHTML = "";
    lapRecords.forEach((r, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${lapRecords.length-i}</td><td>${r.s1.toFixed(2)}</td><td>${r.s2.toFixed(2)}</td><td>${r.s3.toFixed(2)}</td><td>${timeFormat(r.time)}</td><td>${Math.round(r.maxRpm)}</td><td>${r.maxSpeed}</td>`;
        body.appendChild(row);
    });
    document.getElementById('history-page').style.display = 'block';
};

document.getElementById('backBtn').onclick = () => document.getElementById('history-page').style.display = 'none';

function tick() {
    if (swState !== 1) return;
    const now = Date.now();
    document.getElementById('display').textContent = "TOTAL " + timeFormat(now - startTime);
    if (!isFrozen) {
        document.getElementById('display1').textContent = timeFormat(now - lapStartTime);
    } else if (now - freezeStartTime > 10000) {
        isFrozen = false;
    }
    requestAnimationFrame(tick);
}

// --- USB GPS 通信 (簡易版) ---
document.getElementById('usbGpsBtn').onclick = async () => {
    try {
        const device = await navigator.usb.requestDevice({ filters: [] });
        await device.open();
        await device.selectConfiguration(1);
        await device.claimInterface(1);
        document.getElementById('usbGpsBtn').style.background = "var(--hrc-blue)";
        
        while (true) {
            const result = await device.transferIn(2, 64);
            const text = new TextDecoder().decode(result.data);
            const lines = text.split('\n');
            lines.forEach(line => {
                if (line.startsWith('$GPRMC') || line.startsWith('$GNRMC')) {
                    const p = line.split(',');
                    if (p[2] === 'A') {
                        const lat = parseFloat(p[3].slice(0,2)) + parseFloat(p[3].slice(2))/60;
                        const lon = parseFloat(p[5].slice(0,3)) + parseFloat(p[5].slice(3))/60;
                        const spd = parseFloat(p[7]) * 1.852;
                        onGpsUpdate(lat, lon, spd);
                    }
                }
            });
        }
    } catch (e) { console.error(e); }
};

// タコメーター描画
function drawTacho(rpm) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const centerX = canvas.width/2, centerY = canvas.height * 0.8, radius = canvas.width * 0.4;
    ctx.beginPath();
    ctx.strokeStyle = "#333"; ctx.lineWidth = 30;
    ctx.arc(centerX, centerY, radius, Math.PI, 2*Math.PI); ctx.stroke();
    
    const angle = Math.PI + (Math.min(rpm, 12000)/12000) * Math.PI;
    ctx.beginPath();
    ctx.strokeStyle = rpm > 10000 ? "var(--hrc-red)" : "var(--hrc-blue)";
    ctx.lineWidth = 35;
    ctx.arc(centerX, centerY, radius, Math.PI, angle); ctx.stroke();
    document.getElementById('rpm_val').textContent = Math.round(rpm);
    if (swState === 1 && rpm > lapMaxRpm) lapMaxRpm = rpm;
}

window.onload = () => {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight - 60;
    loadTargets();
    (function render(){ drawTacho(currentRPM); requestAnimationFrame(render); })();
};
</script>
</body>
</html>
